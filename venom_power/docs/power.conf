# ═══════════════════════════════════════════════════════════════════════════
# ⚙️ Venom Power Daemon - ملف الإعدادات
# المسار: ~/.config/venom/power.conf
# ═══════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────
# إعدادات الخمول (بالثواني)
# ───────────────────────────────────────────────────────────────────────────
[Idle]
# وقت التعتيم (dim) على الكهرباء وعلى البطارية
DimTimeoutAC=300
DimTimeoutBattery=120

# وقت إطفاء الشاشة (blank)
BlankTimeoutAC=600
BlankTimeoutBattery=300

# وقت السكون التلقائي (على البطارية فقط، 0 = معطل)
SuspendTimeoutBattery=900

# ───────────────────────────────────────────────────────────────────────────
# مستويات البطارية (نسب مئوية)
# ───────────────────────────────────────────────────────────────────────────
[Battery]
# إشعار البطارية المنخفضة
LowLevel=10

# إشعار البطارية الحرجة (مع تنبيه قوي)
CriticalLevel=5

# خطر: ينفّذ CriticalAction فوراً
DangerLevel=2

# ───────────────────────────────────────────────────────────────────────────
# إعدادات الإجراءات
# القيم الممكنة: ignore, lock, suspend, hibernate, poweroff, interactive
# ───────────────────────────────────────────────────────────────────────────
[Actions]
# إجراء الغطاء على الكهرباء
LidActionAC=lock

# إجراء الغطاء على البطارية
LidActionBattery=suspend

# إجراء زر الطاقة
PowerButtonAction=interactive

# إجراء البطارية الحرجة (DangerLevel)
CriticalAction=hibernate

# ───────────────────────────────────────────────────────────────────────────
# إعدادات السطوع
# ───────────────────────────────────────────────────────────────────────────
[Brightness]
# سطوع عند التوصيل بالكهرباء (-1 = بدون تغيير)
AC=-1

# سطوع عند استخدام البطارية (-1 = بدون تغيير)
Battery=-1

# تعتيم الشاشة عند الخمول
DimOnIdle=true

# نسبة التعتيم (%)
DimLevelPercent=30

# ───────────────────────────────────────────────────────────────────────────
# إعدادات إضاءة الكيبورد
# ───────────────────────────────────────────────────────────────────────────
[Keyboard]
# إطفاء تلقائي عند الخمول
AutoOff=true

# وقت الإطفاء (ثواني)
Timeout=30

# ───────────────────────────────────────────────────────────────────────────
# إعدادات القفل
# ───────────────────────────────────────────────────────────────────────────
[Lock]
# قفل الشاشة عند السكون
OnSuspend=true

# قفل الشاشة عند إغلاق الغطاء
OnLid=true

# الأمر المستخدم لقفل الشاشة
# مثال: Command=loginctl lock-session
# مثال: Command=/usr/bin/venomlocker
Command=loginctl lock-session
