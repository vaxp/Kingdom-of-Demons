<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow any user to own the org.venom.Auth name -->
  <policy context="default">
    <allow own="org.venom.Auth"/>
    <allow send_destination="org.venom.Auth"/>
    <allow receive_sender="org.venom.Auth"/>
  </policy>
</busconfig>
